<!DOCTYPE html>
<html lang="en">

<head>
    <title>TWLED - Login</title>
    <meta charset="UTF-8">
    <link type="text/css" rel="stylesheet" href="css/materialize.min.css">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card z-depth-3">
            <img src="images/twled_logo.png" alt="logo" class="login-logo" height="90">
            <p class="login-subtitle">"I can do everything through him who gives me strength."</p>
            <p class="login-subtitle">- Philippians 4:13</p>
            <h4>Sign in</h4>
            <p class="login-subtitle">Enter your credentials to continue.</p>
            <form id="loginForm">
                <div class="input-field">
                    <input id="username" type="text" autocomplete="username">
                    <label for="username">Username</label>
                </div>
                <div class="input-field">
                    <input id="password" type="password" autocomplete="current-password">
                    <label for="password">Password</label>
                </div>
                <p id="lockMessage" class="lock-message"></p>
                <div class="login-actions">
                    <button class="btn waves-effect waves-light" type="submit" id="loginBtn">Login</button>
                    <a class="btn-flat waves-effect credits-btn" href="credits.html">Credits</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/materialize.min.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
